name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-13
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install backend dependencies
        run: npm install

      - name: Build backend
        run: npx tsc && cp -r src/data dist/data

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Copy backend to Tauri bundle
        shell: bash
        run: |
          rm -rf web/src-tauri/backend
          cp -r dist web/src-tauri/backend
          # Build frontend and copy to backend for serving
          cd web && npx vite build
          cp -r dist ../web/src-tauri/backend/web-dist 2>/dev/null || cp -r dist web/src-tauri/backend/web-dist 2>/dev/null || true

      - name: Build frontend
        working-directory: web
        run: npx tsc -b && npx vite build

      - name: Copy web dist to Tauri backend
        shell: bash
        run: cp -r web/dist web/src-tauri/backend/web-dist

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        working-directory: web/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitstore-${{ matrix.target }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            web/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            web/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            web/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            web/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            web/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            web/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.exe
            artifacts/**/*.msi
